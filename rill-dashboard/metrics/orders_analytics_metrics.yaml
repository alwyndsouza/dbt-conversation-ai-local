type: metrics_view

model: orders_enriched

# Primary time dimension
timeseries: order_date
smallest_time_grain: day

dimensions:
  - name: order_date
    column: order_date
    type: time

  - name: order_id
    column: order_id
    type: categorical

  - name: customer_id
    column: customer_id
    type: categorical

  - name: customer_name
    column: customer_name
    type: categorical

  - name: email
    column: email
    type: categorical

  - name: city
    column: city
    type: categorical

  - name: state
    column: state
    type: categorical

  - name: order_status
    column: order_status
    type: categorical

  - name: order_year
    column: order_year

  - name: order_month
    column: order_month

  - name: customer_segment
    column: customer_segment
    type: categorical

measures:
  - name: total_revenue
    display_name: Total Revenue
    expression: SUM(revenue)
    format_preset: currency_usd

  - name: total_orders
    display_name: Total Orders
    expression: COUNT(*)
    format_preset: humanize

  - name: completed_orders
    display_name: Completed Orders
    expression: SUM(completed_order)
    format_preset: humanize

  - name: pending_orders
    display_name: Pending Orders
    expression: SUM(pending_order)
    format_preset: humanize

  - name: cancelled_orders
    display_name: Cancelled Orders
    expression: SUM(cancelled_order)
    format_preset: humanize

  - name: unique_customers
    display_name: Unique Customers
    expression: COUNT(DISTINCT customer_id)
    format_preset: humanize

  - name: avg_order_value
    display_name: Avg Order Value (Completed)
    expression: AVG(order_total) FILTER (WHERE completed_order = 1)
    format_preset: currency_usd
    valid_percent_of_total: false

  - name: completion_rate
    display_name: Completion Rate
    expression: SUM(completed_order) / NULLIF(COUNT(*), 0)
    format_preset: percentage
    valid_percent_of_total: false
