# Rill Dashboard - Orders Analytics
title: "Orders Analytics"
description: "E-commerce orders dashboard with revenue, customers, and geographic analysis"
model: orders

dimensions:
  - name: order_date
    label: "Order Date"
    type: timestamp

  - name: order_status
    label: "Order Status"
    type: categorical

  - name: state
    label: "State"
    type: categorical

  - name: customer_segment
    label: "Customer Segment"
    type: categorical

  - name: customer_name
    label: "Customer Name"
    type: categorical

measures:
  - name: total_revenue
    label: "Total Revenue"
    expression: sum(order_total)
    format_preset: currency_usd

  - name: total_orders
    label: "Total Orders"
    expression: count(*)
    format_preset: number

  - name: avg_order_value
    label: "Avg Order Value"
    expression: avg(order_total)
    format_preset: currency_usd

  - name: completed_orders
    label: "Completed Orders"
    expression: countIf(order_status = 'completed')
    format_preset: number

  - name: pending_orders
    label: "Pending Orders"
    expression: countIf(order_status = 'pending')
    format_preset: number

  - name: cancelled_orders
    label: "Cancelled Orders"
    expression: countIf(order_status = 'cancelled')
    format_preset: number

  - name: total_customers
    label: "Total Customers"
    expression: count(distinct customer_id)
    format_preset: number

pages:
  - title: "Overview"
    tiles:
      - height: 3
        width: 3
        measure: total_revenue
        chart: big_number

      - height: 3
        width: 3
        measure: total_orders
        chart: big_number

      - height: 3
        width: 3
        measure: avg_order_value
        chart: big_number

      - height: 3
        width: 3
        measure: total_customers
        chart: big_number

      - height: 8
        width: 12
        dimensions:
          - order_date
        measures:
          - total_revenue
          - total_orders
        chart: area

      - height: 6
        width: 6
        dimensions:
          - order_status
        measures:
          - total_orders
        chart: pie

      - height: 6
        width: 6
        dimensions:
          - state
        measures:
          - total_revenue
        chart: bar

  - title: "Customer Analysis"
    tiles:
      - height: 6
        width: 6
        dimensions:
          - customer_segment
        measures:
          - total_customers
        chart: pie

      - height: 6
        width: 6
        dimensions:
          - customer_segment
        measures:
          - total_revenue
        chart: bar

      - height: 8
        width: 12
        dimensions:
          - customer_name
        measures:
          - total_revenue
          - total_orders
        chart: table
