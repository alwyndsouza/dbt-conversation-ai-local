name: 'dbt_local_agent'
version: '1.0.0'
config-version: 2

profile: 'dbt-local-agent'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_local_agent:
    staging:
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +tags: ["marts"]

seeds:
  dbt_local_agent:
    +quote_columns: false

vars:
  # Semantic layer variables
  start_date: '2023-01-01'
  end_date: '2024-12-31'
