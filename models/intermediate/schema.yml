version: 2

models:
  - name: int_customer_order_summary
    description: "Intermediate model that aggregates order metrics by customer"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
      - name: total_orders
        description: "Total number of orders for the customer"
      - name: completed_orders
        description: "Number of completed orders"
      - name: pending_orders
        description: "Number of pending orders"
      - name: cancelled_orders
        description: "Number of cancelled orders"
      - name: total_revenue
        description: "Total revenue from completed orders"
      - name: avg_order_value
        description: "Average order value for completed orders"
      - name: first_order_date
        description: "Date of the first order"
      - name: last_order_date
        description: "Date of the most recent order"
