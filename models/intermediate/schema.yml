version: 2

models:
  - name: int_customer_order_summary
    description: >
      Intermediate model that aggregates all order metrics at the customer level.
      One row per customer, showing their complete order history and revenue profile.
      Used by fct_customers to enrich customer profiles with behavioral metrics.
      Materialized as a view for real-time aggregation of order data.
      Key source for customer segmentation and lifetime value calculations.
    columns:
      - name: customer_id
        description: >
          Primary key. Foreign key to stg_customers. Groups all order
          metrics under their respective customer.
        tests:
          - unique
          - not_null
      - name: total_orders
        description: >
          Count of all orders placed by this customer across all statuses.
          Formula: completed_orders + pending_orders + cancelled_orders.
          Represents customer engagement and purchase frequency.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
          - dbt_utils.expression_is_true:
              arguments:
                expression: "= completed_orders + pending_orders + cancelled_orders"
      - name: completed_orders
        description: >
          Count of orders with status 'completed' - successfully delivered
          and payment received. These contribute to revenue metrics.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: pending_orders
        description: >
          Count of orders with status 'pending' - awaiting fulfillment.
          Represents orders in progress, not yet contributing to revenue.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: cancelled_orders
        description: >
          Count of orders with status 'cancelled' - refunded or abandoned.
          Useful for analyzing order completion rates and churn.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: total_revenue
        description: >
          Sum of order_total for all completed orders. Represents actual
          revenue generated by this customer. Excludes pending (unfulfilled)
          and cancelled (refunded) orders.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"
      - name: avg_order_value
        description: >
          Average order_total across completed orders only. Null when a
          customer has no completed orders. Key metric for understanding
          customer purchasing behavior.
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 or avg_order_value is null"
      - name: first_order_date
        description: >
          Date of the customer's earliest order. Marks the beginning of
          the customer relationship. Used for tenure calculation and
          cohort analysis by acquisition date.
        tests:
          - not_null
      - name: last_order_date
        description: >
          Date of the customer's most recent order. Used to identify
          active vs lapsed customers and calculate recency for RFM analysis.
        tests:
          - not_null
